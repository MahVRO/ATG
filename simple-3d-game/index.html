<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple 3D Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="crosshair" aria-hidden="true">+</div>

    <div id="hotbar" aria-label="Hotbar">
        <div class="hotbar-slot selected" data-slot="1"><span>1</span></div>
        <div class="hotbar-slot" data-slot="2"><span>2</span></div>
        <div class="hotbar-slot" data-slot="3"><span>3</span></div>
        <div class="hotbar-slot" data-slot="4"><span>4</span></div>
        <div class="hotbar-slot" data-slot="5"><span>5</span></div>
        <div class="hotbar-slot" data-slot="6"><span>6</span></div>
        <div class="hotbar-slot" data-slot="7"><span>7</span></div>
        <div class="hotbar-slot" data-slot="8"><span>8</span></div>
        <div class="hotbar-slot" data-slot="9"><span>9</span></div>
    </div>

    <div id="pauseMenu" class="hidden" aria-hidden="true">
        <div id="pauseCard">
            <h2>Paused</h2>
            <p id="seedLabel">Seed: 0</p>
            <label for="seedInput">World Seed</label>
            <input id="seedInput" type="text" inputmode="numeric" autocomplete="off" />
            <div class="pauseActions">
                <button id="applySeedBtn" type="button">Apply Seed</button>
                <button id="randomSeedBtn" type="button">Random Seed</button>
            </div>
            <button id="resumeBtn" type="button">Resume</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
